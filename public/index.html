<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Пандемія Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="lobby-view" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100%;">
        <div class="panel" style="width: 400px; text-align: center;">
            <h2 style="color: #63b3ed;">Зала очікування</h2>
            <p style="color: #a0aec0;">Очікуємо гравців...</p>
            
            <ul id="lobby-players" style="list-style: none; padding: 0; margin: 20px 0; text-align: left;">
                </ul>

            <button id="btn-ready" style="width: 100%; padding: 15px; background-color: #48bb78; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1em; transition: 0.2s;">
                Я ГОТОВИЙ
            </button>
        </div>
    </div>

    <div id="game-view" style="display: none; width: 100%; height: 100vh;">
        <div id="game-container">
            <canvas id="gameCanvas" width="1200" height="675"></canvas>
        </div>

        <div id="ui-panel">
            <div class="panel">
                <h2>Ваш статус</h2>
                <p><strong>Роль:</strong> <span id="my-role" style="color: #4299e1;"></span></p>
                <p id="my-role-desc" style="font-size: 0.85em; color: #a0aec0; margin-top: -10px; margin-bottom: 15px; font-style: italic; line-height: 1.3;"></p>
                <p><strong>Місто:</strong> <span id="my-city"></span></p>
                <p><strong>Дій:</strong> <span id="my-actions" style="color: #ed8936; font-size: 1.2em; font-weight: bold;">-</span></p>
                <div id="action-menu" style="margin-top: 15px; border-top: 1px solid #4a5568; padding-top: 10px;">
                <button id="btn-treat" style="display: none; width: 100%; padding: 8px; background-color: #3182ce; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.95em; transition: 0.2s;">
                    💊 Лікувати хворобу
                </button>
            </div>
            </div>

            <div class="panel" style="margin-top: 15px; border-top: 2px solid #4a5568; padding-top: 15px;">
                <h3 id="turn-indicator" style="text-align: center; margin-bottom: 10px;">Очікування...</h3>
                <button id="end-turn-btn" style="display: none; width: 100%; padding: 10px; background-color: #e53e3e; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1em;">Завершити хід</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
