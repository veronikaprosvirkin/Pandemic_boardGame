<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пандемія Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="lobby-view" class="flex-center">
        <div class="panel lobby-panel">
            <h2 class="text-blue">Зала очікування</h2>
            <p id="lobby-status" class="text-gray">Очікуємо гравців... (мінімум 2)</p>
            <ul id="lobby-players" class="lobby-list"></ul>
            <button id="btn-ready" class="btn-ready">
                Я ГОТОВИЙ
            </button>
        </div>
    </div>

    <div id="game-view" class="is-hidden game-view">
        <div id="game-container">
            <canvas id="gameCanvas" width="1200" height="675"></canvas>
        </div>

        <div id="ui-panel">
            <div class="panel">
                <h2>Ваш статус</h2>
                <p><strong>Роль:</strong> <span id="my-role" class="text-blue"></span></p>
                <p id="my-role-desc" class="role-desc"></p>
                <p><strong>Місто:</strong> <span id="my-city"></span></p>
                <p><strong>Дій:</strong> <span id="my-actions" class="text-orange actions-text">-</span></p>
                
                <div id="action-menu" class="cards-section">
                    <button id="btn-treat" class="action-button is-hidden">
                        💊 Лікувати хворобу
                    </button>
                    <button id="btn-build" class="action-button" style="display: none; background-color: #ecc94b; color: #1a202c;">
                        🏗️ Побудувати станцію
                    </button>
                </div>
            </div>

            <div class="panel global-stats-panel">
                <h3 id="turn-indicator" class="global-stats-title">Очікування...</h3>
                <button id="end-turn-btn" class="action-button end-turn-btn is-hidden">Завершити хід</button>
                
                <div class="cards-section">
                    <p class="bottom-cards-title"><strong>Ваші карти міст:</strong></p>
                    <div id="my-cards-container">
                        <span class="no-cards-text">Немає карт</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
